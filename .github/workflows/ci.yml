name: Microservices CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT: mini-ecommerce
  TRIVY_IMAGE: aquasec/trivy:0.57.1
  TRIVY_SOURCE_SEVERITY: MEDIUM,HIGH,CRITICAL
  TRIVY_SEVERITY: HIGH,CRITICAL
  TRIVY_EXIT_CODE: "1"
  TRIVY_IGNORE_UNFIXED: "true"

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.detect.outputs.services }}
      has_services: ${{ steps.detect.outputs.has_services }}
      run_contract: ${{ steps.detect.outputs.run_contract }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed services
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi

          if [[ -z "${BASE_SHA}" || "${BASE_SHA}" == "0000000000000000000000000000000000000000" ]]; then
            if git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
              BASE_SHA="$(git rev-parse HEAD~1)"
            else
              BASE_SHA="$(git rev-list --max-parents=0 HEAD)"
            fi
          fi

          CHANGED_FILES="$(git diff --name-only "${BASE_SHA}" "${GITHUB_SHA}" || true)"
          export CHANGED_FILES
          echo "Changed files:"
          echo "${CHANGED_FILES}"

          python3 - <<'PY' > /tmp/ci_detect.json
          import json
          import os

          services = [
              {"name": "api-gateway", "dir": "api-gateway", "kind": "java", "image": "api-gateway"},
              {"name": "user-service", "dir": "user-service", "kind": "go", "image": "user-service"},
              {"name": "product-service", "dir": "product-service", "kind": "java", "image": "product-service"},
              {"name": "inventory-service", "dir": "inventory-service", "kind": "go", "image": "inventory-service"},
              {"name": "payment-service", "dir": "payment-service", "kind": "java", "image": "payment-service"},
              {"name": "order-service", "dir": "order-service", "kind": "java", "image": "order-service"},
              {"name": "frontend", "dir": "front-end", "kind": "frontend", "image": "frontend"},
          ]

          changed = [x for x in os.environ.get("CHANGED_FILES", "").splitlines() if x.strip()]
          ci_changed = any(x == "Jenkinsfile" or x.startswith(".github/workflows/") for x in changed)
          contracts_changed = any(x.startswith("api-contracts/") for x in changed)

          selected = []
          for svc in services:
            if ci_changed or any(x.startswith(f"{svc['dir']}/") for x in changed):
              selected.append(svc)

          out = {
            "services": selected,
            "has_services": bool(selected),
            "run_contract": bool(selected) or contracts_changed or ci_changed,
          }
          print(json.dumps(out))
          PY

          SERVICES_JSON="$(jq -c '.services' /tmp/ci_detect.json)"
          HAS_SERVICES="$(jq -r '.has_services' /tmp/ci_detect.json)"
          RUN_CONTRACT="$(jq -r '.run_contract' /tmp/ci_detect.json)"

          {
            echo "services=${SERVICES_JSON}"
            echo "has_services=${HAS_SERVICES}"
            echo "run_contract=${RUN_CONTRACT}"
          } >> "$GITHUB_OUTPUT"

          echo "Selected services: ${SERVICES_JSON}"

  contract-validation:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.run_contract == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate OpenAPI contracts
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          specs=(api-contracts/*.openapi.yaml)
          if (( ${#specs[@]} == 0 )); then
            echo "No OpenAPI contracts found in api-contracts/."
            exit 0
          fi

          for spec in "${specs[@]}"; do
            echo "Validating ${spec}"
            docker run --rm \
              -v "$PWD:/work" \
              -w /work \
              node:20-alpine \
              sh -lc "npx --yes @apidevtools/swagger-cli@4.0.4 validate '${spec}'"
          done

  service-pipelines:
    runs-on: ubuntu-latest
    needs: [detect-changes, contract-validation]
    if: needs.detect-changes.outputs.has_services == 'true' && (needs.contract-validation.result == 'success' || needs.contract-validation.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}
    env:
      DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image ref
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_SHA::7}"
          OWNER="${DOCKERHUB_USER:-${GITHUB_ACTOR}}"
          IMAGE_REF="${OWNER}/${PROJECT}-${{ matrix.service.image }}:${TAG}"
          {
            echo "image_tag=${TAG}"
            echo "image_ref=${IMAGE_REF}"
          } >> "$GITHUB_OUTPUT"
          echo "image_ref=${IMAGE_REF}"

      - name: Test ${{ matrix.service.name }}
        shell: bash
        run: |
          set -euo pipefail
          case "${{ matrix.service.kind }}" in
            java)
              docker run --rm \
                -v "$PWD/${{ matrix.service.dir }}:/app" \
                -w /app \
                maven:3.9.6-eclipse-temurin-17 \
                mvn -B test
              ;;
            go)
              docker run --rm \
                -v "$PWD/${{ matrix.service.dir }}:/app" \
                -w /app \
                golang:1.24-alpine \
                sh -lc "go test ./..."
              ;;
            frontend)
              docker run --rm \
                -v "$PWD/${{ matrix.service.dir }}:/app" \
                -w /app \
                node:20-alpine \
                sh -lc "npm ci && npm run build"
              ;;
            *)
              echo "Unknown service kind: ${{ matrix.service.kind }}" >&2
              exit 1
              ;;
          esac

      - name: Build image ${{ matrix.service.name }}
        shell: bash
        run: |
          set -euo pipefail
          docker build -t "${{ steps.vars.outputs.image_ref }}" "./${{ matrix.service.dir }}"

      - name: Prepare Trivy DB
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .trivy-cache
          docker run --rm -v "$PWD/.trivy-cache:/root/.cache/" "${TRIVY_IMAGE}" image --download-db-only --no-progress
          docker run --rm -v "$PWD/.trivy-cache:/root/.cache/" "${TRIVY_IMAGE}" image --download-java-db-only --no-progress

      - name: Trivy source scan ${{ matrix.service.name }}
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            -v "$PWD:/work" \
            -v "$PWD/.trivy-cache:/root/.cache/" \
            -w /work \
            "${TRIVY_IMAGE}" fs \
            --no-progress \
            --skip-db-update \
            --skip-java-db-update \
            --scanners vuln \
            --severity "${TRIVY_SOURCE_SEVERITY}" \
            --exit-code "${TRIVY_EXIT_CODE}" \
            --ignore-unfixed="${TRIVY_IGNORE_UNFIXED}" \
            "./${{ matrix.service.dir }}"

      - name: Trivy image scan ${{ matrix.service.name }}
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD/.trivy-cache:/root/.cache/" \
            "${TRIVY_IMAGE}" image \
            --no-progress \
            --skip-db-update \
            --skip-java-db-update \
            --scanners vuln \
            --severity "${TRIVY_SEVERITY}" \
            --exit-code "${TRIVY_EXIT_CODE}" \
            --ignore-unfixed="${TRIVY_IGNORE_UNFIXED}" \
            "${{ steps.vars.outputs.image_ref }}"

      - name: Docker login
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.DOCKERHUB_USER != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USER }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Push image ${{ matrix.service.name }}
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && env.DOCKERHUB_USER != '' && env.DOCKERHUB_TOKEN != ''
        shell: bash
        run: |
          set -euo pipefail
          docker push "${{ steps.vars.outputs.image_ref }}"

      - name: Cleanup local artifacts
        if: always()
        shell: bash
        run: |
          set +e
          docker image rm -f "${{ steps.vars.outputs.image_ref }}" >/dev/null 2>&1 || true
          docker image prune -f >/dev/null 2>&1 || true
          docker system prune -f --filter "until=24h" >/dev/null 2>&1 || true
          rm -rf .trivy-cache || true

  no-changes:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.has_services != 'true' && needs.detect-changes.outputs.run_contract != 'true'
    steps:
      - run: echo "No relevant service or contract changes detected."

spring:
  datasource:
    url: jdbc:h2:mem:orderdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  task:
    scheduling:
      enabled: false

clients:
  product-service:
    base-url: http://product-service:8080
  inventory-service:
    base-url: http://inventory-service:8080
  payment-service:
    base-url: http://payment-service:8080

saga:
  retry:
    max-attempts: 1
    initial-backoff-ms: 10

outbox:
  publisher:
    enabled: true
    fixed-delay-ms: 60000
    batch-size: 10
    max-retry-attempts: 3
    initial-backoff-ms: 10

management:
  tracing:
    enabled: false

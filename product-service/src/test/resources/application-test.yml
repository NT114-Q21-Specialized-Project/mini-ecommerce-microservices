spring:
  datasource:
    url: jdbc:h2:mem:productdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

management:
  tracing:
    enabled: false

logging:
  level:
    org.hibernate.SQL: INFO

security:
  internal:
    token: test-internal-token
